<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenya Safari Guide 2026 | Tourist Hub</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="glass-nav">
        <div class="logo">🇰🇪 <span>SafariHub</span></div>
        <ul class="nav-links">
            <li><a href="#map-section">Safari Map</a></li>
            <li><a href="#assistant">Voice Guide</a></li>
            <li><a href="#virtual-museum">3D Gallery</a></li>
        </ul>
    </nav>

    <section id="map-section" class="map-container">
        <div class="section-info">
            <h2>Interactive Safari Map</h2>
            <p>Click a marker to explore Kenya's iconic circuits.</p>
        </div>
        <div id="safariMap"></div>
    </section>

    <section id="assistant" class="tool-section">
        <div class="tool-card voice-card">
            <h2>🗣️ Swahili Voice Assistant</h2>
            <p>Listen and learn the local dialect.</p>
            <div class="voice-controls">
                <button onclick="speakPhrase('Jambo! Karibu Kenya')">Hear "Welcome"</button>
                <button onclick="speakPhrase('Habari yako?')">Hear "How are you?"</button>
            </div>
            <div id="visualizer"><span></span><span></span><span></span></div>
        </div>
    </section>

    <section id="virtual-museum" class="museum-section">
        <h2>Virtual Cultural Gallery</h2>
        <div class="aframe-container">
            <p>Interact with the 3D Shield (Drag to Rotate)</p>
            <a-scene embedded style="height: 400px; width: 100%;">
                <a-sky color="#1a1a1a"></a-sky>
                <a-entity position="0 1 -3">
                    <a-cylinder color="#BB0000" height="2" radius="0.5" rotation="0 0 0"></a-cylinder>
                    <a-cone color="#000" height="0.5" radius-bottom="0.5" position="0 1.2 0"></a-cone>
                    <a-cone color="#000" height="0.5" radius-bottom="0.5" position="0 -1.2 0" rotation="180 0 0"></a-cone>
                </a-entity>
                <a-light type="ambient" color="#fff"></a-light>
                <a-light type="point" intensity="1" position="2 4 4"></a-light>
            </a-scene>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
